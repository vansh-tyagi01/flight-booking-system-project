<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Booking System</title>
    <style>
        body {
            background-image: url("https://images.unsplash.com/photo-1500835556837-99ac94a94552?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8cGxhbmUlMjB3YWxscGFwZXJ8ZW58MHx8MHx8fDA%3D");
            background-repeat: no-repeat;
            background-size: cover;
        }
        .contain {
            width: 500px;
            height: 1493px;
            border: 1px solid black;
            border-radius: 7px;
            background-color: white;
            margin-top: 0;
            margin-left: 0;
            margin-right: 0;
            margin-bottom: 30px;
            margin: auto;
            background-color:#f5f5f7;
        }
        .flight-style {
            text-align: center;
            margin-top: 0;
            margin-bottom: 0;
            margin-left: 0;
            margin-right: 0;
            padding: 0;
        }
        .flight-head {
            margin-top: 0px;
            margin-bottom: 50px;
            margin-left: 0px;
            margin-right: 0px;
            border: 3px solid black;
            position: sticky;
            top: 0;
        }
        .h1-head {
            display: inline-block;
            background-color: yellow;
            color: black;
            font-weight: bolder;
            width: 100%;
            margin: 0;
        }
        .first-input-style {
            margin-top: 0;
        }
        .h3-div {
            margin-top: 0;
            padding: 0;
        }
        .h3-style {
            display: inline-block;
            font-size: large;
            background-color: blue;
            color: white;
            padding: 5px;
            border-radius: 8px;
        }
        .label-style {
            padding: 35px;
            text-align:left;
            border: 1px solid black;
            border-top: 2px solid black;
            margin-top: 25px;
        }
        .input-style {
            border: 1px solid black;
            padding: 8px;
            width: 200px;
            border: 1.5px solid black;
            border-radius: 7px;
        }
        .btn-color {
            border: 1px solid black;
            padding: 14px;
            margin-bottom: 80px;
            border-bottom: 2px solid black;
            border-radius: 4px;
        }
        .btn-style1 {
            display: inline-block;
            background-color: green;
            padding: 10px;
            font-size: large;
            cursor: pointer;
            color: white;
        }
        .btn-style2 {
            display: inline-block;
            background-color:red;
            padding: 10px;
            font-size: large;
            cursor: pointer;
            color: white;
        }
        .btn-style3 {
            display: inline-block;
            background-color: green;
            padding: 10px;
            font-size: large;
            cursor: pointer;
            color: white;
            
        }
        .video-style {
            margin-bottom: 30px;
            border-radius: 7px;
            margin:0;
            padding: 10px;
            text-align: right;
            top: 0;
            right: 0;
            position: fixed;
        }
        .video-edit {
            
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            overflow: hidden;
            border: 2px solid black;
        }
        .btn-colorshow {
            border: 2px solid black;
            border-top: 2.5 solid black;
            padding: 14px;
            margin-bottom: 80px;
            border-radius: 4px;
        }
        .show-para{
            font-family: Arial, Helvetica, sans-serif;
        }
        .pasenger-div {
            margin-bottom: 50px;
        }
        .available-div {
            margin-bottom: 50px;
        }
    </style>
</head>
<body>
    <div class="video-style">
        <video class="video-edit" autoplay loop muted title="Hello everyone, let's take off on the long flight of life.">
            <source src="{{ url_for('static', filename='WhatsApp Video 2026-03-04 at 12.22.39 PM.mp4') }}" type="video/mp4">
        </video>
    </div>
    <section class="contain">
        <div class="flight-style">
            <div class="flight-head">
                <h1 class="h1-head">✈️FLIGHT BOOKING SYSTEM</h1>
            </div>
            <div class="first-input-style">
                <div class="h3-div">
                    <h2 class="h3-style">💺Book Seat</h2>
                </div>
                <form method="POST" action="/ticket_book">
                <div class="label-style">
                    <label for="username"><b>Name :</b></label>
                    <input type="text" name="username" id="username" placeholder="enter full name" class="input-style"><br><br>

                    <label for="number"><b>Seat Number :</b></label>
                    <input type="number" name="seat_number" id="number" placeholder="choose seat number to book" class="input-style"><br><br>
                </div>
                <div class="btn-color">
                    <button class="btn-style1">Book</button>
                </div>
                </form>
            </div>
            <div class="sec-input-style">
                <div class="h3-div">
                    <h3 class="h3-style">✖️Cancel Seat</h3>
                </div>
                <form method="POST" action="/ticket_cancel">
                <div class="label-style">
                    <label for="username"><b>Name :</b></label>
                    <input type="text" name="username" id="username" placeholder="enter full name" class="input-style"><br><br>

                    <label for="number"><b>Seat Number :</b></label>
                    <input type="number" name="seat_number" id="number" placeholder="enter seat number to cancel" class="input-style"><br><br>
                </div>
                <div class="btn-color">
                    <button class="btn-style2">Cancel</button>
                </div>
                </form>
            </div>

            <div class="third-input-style">
                <div class="pasenger-div">
                    <h3 class="h3-style">passenger name & seat</h3>
                </div>
                <form action="/show">
                    <p class="show-para">Click the button below to view passenger name and seat number. Thank you</p>

                    <div class="btn-colorshow">
                        <button class="btn-style3">Show</button>
                    </div>
                </form>
            </div>

            <div class="forth-input-style">
                <div class="available-div">
                    <h3 class="h3-style">Available Seat</h3>
                </div>
                <form action="/Available">
                    <p class="show-para">Click the button below to view Available seat. Thank you</p>

                    <div class="btn-colorshow">
                        <button class="btn-style3">Available Seat</button>
                    </div>
                </form>
            </div>


        </div>
    </section>
</body>
</html>
