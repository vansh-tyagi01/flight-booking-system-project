<!DOCTYPE html>
<html>
<head>
    <title>Show Passenger Data</title>
    <style>
        body{
            background-color: #f5f5f7;
            margin:0;
        }
        .container{
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        table{
            margin: auto;
        }
        .h1-div{
            margin-bottom: 30px;
            padding: 8px;
            margin: 0;
        }
        .h1-head{
            display: inline-block;
            background-color: blue;
            color: white;
            border: 2px solid black;
            border-radius: 8px;
            padding: 10px;
            
        }
        .table-width{
            width: 170px;
        }
        form {
            margin-top: 100px;
            text-align: center;
        }
        .btn-back {
            border: 1px solid black;
            border-radius: 7px;
            cursor: pointer;
            padding: 8px;
            background-color: blue;
            color: white;
            font-size: larger;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="h1-div">
            <h1 class="h1-head">List of passenger name and seat number</h1>
        </div>
        <table border="1" class="table-width">
            <tr>
                <th>Name</th>
                <th>Seat no</th>
            </tr>
            {% for passenger in data %}
            <tr>
                <td>{{passenger[0]}}</td>
                <td>{{passenger[1]}}</td>
            </tr>
            {% endfor %}
        </table>


        <form action="/home">
            <button class="btn-back">Home</button>
        </form>



    </div>
</body>
</html>
